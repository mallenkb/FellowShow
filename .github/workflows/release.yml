name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  CMAKE_OSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  prepare-bible-db:
    name: Prepare Bible database
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bible database cache
        id: bible-db-cache
        uses: actions/cache@v4
        with:
          path: data/fellowshow.db
          key: bible-db-bundled-${{ hashFiles('data/schema.sql', 'data/build-bible-db.ts', 'data/prepare-release-bible.ts', 'data/download-sources.ts', 'data/download-asante-twi.ts', 'data/download-biblegateway.py') }}

      - name: Set up Python
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Install BibleGateway downloader dependency
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        run: python -m pip install meaningless

      - name: Download Bible source data
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        env:
          BIBLEGATEWAY_BOOK_DELAY: "1"
          BIBLEGATEWAY_TRANSLATIONS: "NKJV,NIV"
          PYTHONUTF8: "1"
        run: |
          bun run download:bible-data
          python data/download-biblegateway.py

      - name: Download Asante Twi source data
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        run: bun run download:asante-twi

      - name: Build Bible database
        if: steps.bible-db-cache.outputs.cache-hit != 'true'
        run: bun run prepare:release-bible

      - name: Verify Bible database
        run: |
          test -s data/fellowshow.db
          bun -e "const { Database } = require('bun:sqlite'); const db = new Database('data/fellowshow.db'); console.log(db.query('select count(*) as count from translations').get().count + ' translations'); console.log(db.query('select count(*) as count from verses').get().count + ' verses');"

      - name: Upload Bible database
        uses: actions/upload-artifact@v4
        with:
          name: fellowshow-bible-db
          path: data/fellowshow.db
          if-no-files-found: error

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare-bible-db
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            bundle_args: --bundles nsis
            artifact_name: fellowshow-windows-installer
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
              src-tauri/target/release/bundle/nsis/latest.json
          - name: macOS package
            os: macos-latest
            bundle_args: --bundles app,dmg
            artifact_name: fellowshow-macos-dmg
            artifact_path: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.tar.gz
              src-tauri/target/release/bundle/macos/*.tar.gz.sig
              src-tauri/target/release/bundle/macos/latest.json
              src-tauri/target/release/bundle/dmg/*.dmg.sig
              src-tauri/target/release/bundle/dmg/latest.json
          - name: Linux packages
            os: ubuntu-24.04
            bundle_args: --bundles deb,appimage
            artifact_name: fellowshow-linux-packages
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/deb/*.deb.sig
              src-tauri/target/release/bundle/deb/latest.json
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/appimage/latest.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows build prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm cmake nsis -y --no-progress
          $llvmBin = Join-Path ${env:ProgramFiles} "LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll was not found at $llvmBin"
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Bible database
        uses: actions/download-artifact@v4
        with:
          name: fellowshow-bible-db
          path: data

      - name: Verify bundled Bible database exists
        run: bun -e "if (!require('node:fs').statSync('data/fellowshow.db').size) process.exit(1)"

      - name: Build bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx tauri build ${{ matrix.bundle_args }}

      - name: Verify installer silently installs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows NSIS installer was produced."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "FellowShowInstall"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $process = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Installer exited with code $($process.ExitCode)."
          }

          $installedApp = Get-ChildItem -Path $installDir -Filter "fellowshow.exe" -Recurse | Select-Object -First 1
          if (-not $installedApp) {
            $installedApp = Get-ChildItem -Path $installDir -Filter "FellowShow.exe" -Recurse | Select-Object -First 1
          }
          if (-not $installedApp) {
            throw "Installer completed, but the FellowShow executable was not found in $installDir."
          }

          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Verified $($installer.Name) installs to $installDir"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p release-upload
          while IFS= read -r file; do
            name="$(basename "$file")"
            if [ "$name" = "latest.json" ]; then
              continue
            fi
            name="${name// /.}"
            if [ -e "release-upload/$name" ]; then
              parent="$(basename "$(dirname "$file")")"
              name="${parent}-${name}"
            fi
            cp "$file" "release-upload/$name"
          done < <(find release-artifacts -maxdepth 4 -type f)
          bun run data/merge-tauri-updater-manifests.ts \
            release-artifacts \
            release-upload/latest.json \
            "$tag" \
            "${{ github.repository }}"
          find release-upload -maxdepth 1 -type f -print | sort
          gh release delete "$tag" --yes 2>/dev/null || true
          gh release create "$tag" \
            --title "Fellow Show $tag" \
            --generate-notes \
            release-upload/*
