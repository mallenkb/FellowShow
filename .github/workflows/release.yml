name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            bundle_args: --bundles nsis
            artifact_name: fellowshow-windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS package
            os: macos-latest
            bundle_args: --bundles dmg
            artifact_name: fellowshow-macos-dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux packages
            os: ubuntu-24.04
            bundle_args: --bundles deb,appimage
            artifact_name: fellowshow-linux-packages
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Windows build prerequisites
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm cmake nsis -y --no-progress
          $llvmBin = Join-Path ${env:ProgramFiles} "LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll was not found at $llvmBin"
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles
        run: bunx tauri build ${{ matrix.bundle_args }}

      - name: Verify installer silently installs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows NSIS installer was produced."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "FellowShowInstall"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $process = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Installer exited with code $($process.ExitCode)."
          }

          $installedApp = Get-ChildItem -Path $installDir -Filter "fellowshow.exe" -Recurse | Select-Object -First 1
          if (-not $installedApp) {
            $installedApp = Get-ChildItem -Path $installDir -Filter "FellowShow.exe" -Recurse | Select-Object -First 1
          }
          if (-not $installedApp) {
            throw "Installer completed, but the FellowShow executable was not found in $installDir."
          }

          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Verified $($installer.Name) installs to $installDir"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          gh release create "$tag" \
            --title "FellowShow $tag" \
            --generate-notes \
            release-artifacts/*
