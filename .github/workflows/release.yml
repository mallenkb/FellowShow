name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build and verify Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Windows build prerequisites
        shell: pwsh
        run: |
          choco install llvm cmake nsis -y --no-progress
          $llvmBin = Join-Path ${env:ProgramFiles} "LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            throw "libclang.dll was not found at $llvmBin"
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build NSIS installer
        run: bun run tauri build -- --bundles nsis

      - name: Verify installer silently installs
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "No Windows NSIS installer was produced."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "FellowShowInstall"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          $process = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Installer exited with code $($process.ExitCode)."
          }

          $installedApp = Get-ChildItem -Path $installDir -Filter "fellowshow.exe" -Recurse | Select-Object -First 1
          if (-not $installedApp) {
            $installedApp = Get-ChildItem -Path $installDir -Filter "FellowShow.exe" -Recurse | Select-Object -First 1
          }
          if (-not $installedApp) {
            throw "Installer completed, but the FellowShow executable was not found in $installDir."
          }

          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Verified $($installer.Name) installs to $installDir"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fellowshow-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            throw "No installer found to upload."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "FellowShow $tag" --generate-notes $installer.FullName
          } else {
            gh release upload $tag $installer.FullName --clobber
          }
