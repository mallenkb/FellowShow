name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push makes results from an older run irrelevant. Cancelling it also
# keeps the limited macOS/Linux runner pool available for the newest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14
  CARGO_TERM_COLOR: always

jobs:
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run knip
      - run: bun run format:check
      - run: bun audit --audit-level=high

  frontend-test-build:
    name: Frontend test and build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run test --run
      # TypeScript was already checked by frontend-quality. Calling Vite
      # directly avoids compiling the project a second time via `tsc -b`.
      - run: bunx vite build

  rust-quality:
    name: Rust format and audit
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  rust-compile:
    name: Rust ${{ matrix.check.name }}
    runs-on: ubuntu-24.04
    env:
      # These settings affect CI test/check artifacts only. Release builds use
      # the unchanged release workflow and Cargo profiles.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTC_WRAPPER: sccache
      RUSTFLAGS: -C linker=clang -C link-arg=-fuse-ld=lld
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: tests
            command: cargo test --workspace --all-targets --locked
          - name: Clippy
            command: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Installing the small component in both matrix jobs avoids passing
          # an empty component value to the setup action.
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci-${{ matrix.check.name }}
          cache-on-failure: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            libclang-dev \
            lld \
            cmake
        working-directory: .
      - name: Prepare test database resource
        run: |
          python3 - <<'PY'
          import sqlite3
          from pathlib import Path

          database_path = Path("data/fellowshow.db")
          schema = Path("data/schema.sql").read_text()
          with sqlite3.connect(database_path) as connection:
              connection.executescript(schema)
          PY
        working-directory: .
      - run: ${{ matrix.check.command }}
